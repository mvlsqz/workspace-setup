onboarding = false

[theme]
name = "rose-pine"
auto_switch = true
light_name = "rose-pine-dawn"
dark_name = "rose-pine"

# nightfox/dawnfox palette (EdenEast/nightfox.nvim)
# One custom block applies to BOTH themes, so accent uses dawnfox's
# darker blue (#295e73) which stays readable on the light theme and
# still visible on the dark theme.
[theme.custom]
accent = "#295e73"
red = "#c94f6d"
green = "#81b29a"
yellow = "#dbc074"
blue = "#295e73"

[terminal]
shell_mode = "auto"
new_cwd = "follow"

[keys]
prefix = "alt+g"

help = "prefix+?"
settings = "prefix+shift+s"
reload_config = "prefix+shift+r"
detach = "prefix+d"

workspace_picker = "prefix+w"
new_workspace = "prefix+shift+n"
close_workspace = "prefix+shift+d"

new_tab = "prefix+t"
previous_tab = "prefix+p"
next_tab = "prefix+n"
switch_tab = "prefix+1..9"
rename_tab = "prefix+shift+t"
close_tab = "prefix+shift+x"

focus_pane_left = "prefix+h"
focus_pane_down = "prefix+j"
focus_pane_up = "prefix+k"
focus_pane_right = "prefix+l"

split_vertical = "prefix+v"
split_horizontal = "prefix+s"
close_pane = "prefix+x"
rename_pane = "prefix+shift+p"
zoom = "prefix+z"
resize_mode = "prefix+r"
toggle_sidebar = "prefix+b"

copy_mode = "prefix+["
edit_scrollback = "prefix+e"

navigate_pane_left = "h"
navigate_pane_down = "j"
navigate_pane_up = "k"
navigate_pane_right = "l"

[ui]
sidebar_width = 26
sidebar_min_width = 18
sidebar_max_width = 36
mouse_capture = true
redraw_on_focus_gained = false
confirm_close = true
prompt_new_tab_name = true
pane_borders = false
pane_gaps = false
accent = "#295e73"

[session]
resume_agents_on_restore = true
